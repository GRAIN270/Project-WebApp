<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cook Menu</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-slate-50 text-slate-800 font-sans">
  <aside class="w-56 bg-white border-r border-slate-200 flex flex-col justify-between shrink-0">
    <div>
      <h1 class="h-20 px-6 flex items-center text-2xl font-black border-b border-slate-200 text-indigo-600 shrink-0">ครัวนรก</h1>
      <nav class="p-4 flex flex-col gap-2">
        <a href="#" class="px-4 py-2.5 bg-indigo-50 text-indigo-700 font-bold rounded-lg border-l-4 border-indigo-600 transition">
          Menu
        </a>
        <a href="./Order_cook.html" class="px-4 py-2.5 text-slate-500 font-medium hover:bg-slate-50 hover:text-slate-900 rounded-lg transition">
          Order
        </a>
      </nav>
    </div>
    <div class="p-4 border-t border-slate-200">
      <a href="" class="block text-center py-2.5 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-bold transition">
        Logout
      </a>
    </div>
  </aside>
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-20 px-8 border-b border-slate-200 flex justify-between items-center bg-white shrink-0">
      <input type="text" placeholder="Search menu..." class="bg-slate-100 border-transparent rounded-lg px-4 py-2 w-72 outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition">
      </header>
    <div class="p-8 overflow-auto flex-1">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div class="bg-white border border-slate-200 rounded-xl flex flex-col shadow-sm hover:shadow-md transition duration-300">
          <img src="/Frontend/Cook/image/padthai.png" alt="Pad Thai" class="h-36 w-full object-cover rounded-t-xl">
          <div class="p-4 flex justify-between items-start">
            <div>
              <div class="font-bold text-lg text-slate-800">Pad Thai</div>
              <div class="text-sm text-amber-400 font-bold mt-1">★ 5</div>
            </div>
            <div class="font-black text-indigo-600 text-lg">$19</div>
          </div>
        </div>
        <div class="bg-white border border-slate-200 rounded-xl flex flex-col shadow-sm hover:shadow-md transition duration-300">
          <img src="/Frontend/Cook/image/khaomootod.png" alt="Khao Moo Tod" class="h-36 w-full object-cover rounded-t-xl">
          <div class="p-4 flex justify-between items-start">
            <div>
              <div class="font-bold text-lg text-slate-800">Khao Moo Tod</div>
              <div class="text-sm text-amber-400 font-bold mt-1">★ 4</div>
            </div>
            <div class="font-black text-indigo-600 text-lg">$19</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
