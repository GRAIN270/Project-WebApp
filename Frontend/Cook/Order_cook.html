<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Cook Order - Colorful Minimal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex h-screen bg-slate-50 text-slate-800 font-sans">
  <aside class="w-56 bg-white border-r border-slate-200 flex flex-col justify-between shrink-0">
    <div>
      <h1 class="text-2xl font-black p-6 border-b border-slate-200 text-indigo-600">ครัวนรก</h1>
      <nav class="p-4 flex flex-col gap-2">
        <a href="./dashboard_Cook.html" class="px-4 py-2.5 text-slate-500 font-medium hover:bg-slate-50 hover:text-slate-900 rounded-lg ">
          Menu
        </a>
        <a href="#" class="px-4 py-2.5 text-indigo-700 font-bold rounded-lg border-l-4 border-indigo-600 ">
          Order
        </a>
      </nav>
    </div>
    <div class="p-4 border-t border-slate-200">
      <a href="./Login.html" class="block text-center py-2.5 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-bold ">
        Logout
      </a>
    </div>
  </aside>
  <main class="flex-1 flex flex-col overflow-hidden">
    <header class="border-b border-slate-200 p-4 flex justify-between items-center bg-white shrink-0">
      <input type="text" placeholder="Search orders..." class="bg-slate-100 border-transparent rounded-lg px-4 py-2 w-72 outline-none focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition">
    </header>
    <div class="p-8 overflow-auto flex-1">
      <div class="bg-white border border-slate-200 rounded-xl p-6 max-w-3xl shadow-sm">
        <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-5">
          <div class="bg-indigo-50 text-indigo-700 px-4 py-1.5 font-bold rounded-lg text-lg">
            Order 1
          </div>
          <div class="text-slate-500 font-medium">
            Order Time
          </div>
        </div>
        <div class="flex flex-col gap-5 pl-2 mb-6">
          <div class="flex items-center gap-4">
            <span class="flex-1 font-bold text-xl">Pad Thai</span>
            <div class="w-9 h-9 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold">1</div>
            <span class="text-sm font-medium text-slate-400">Comments</span>
            <input type="text" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 w-56 outline-none focus:bg-white focus:border-indigo-500 transition">
          </div>
          <div class="flex items-center gap-4">
            <span class="flex-1  font-bold text-xl">Khao Moo Tod</span>
            <div class="w-9 h-9 bg-indigo-100 text-indigo-700 rounded-full flex items-center justify-center font-bold">1</div>
            <span class="text-sm font-medium text-slate-400">Comments</span>
            <input type="text" class="bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 w-56 outline-none focus:bg-white focus:border-indigo-500 transition">
          </div>
        </div>
        <div class="flex items-center gap-3 pt-5 border-t border-slate-100">
          <span class="font-bold text-slate-400 mr-2 uppercase text-sm">Update</span>
          <button class="bg-red-50 text-red-600 border border-red-200 hover:bg-red-100 px-5 py-2 rounded-lg font-bold transition">Pending</button>
          <button class="bg-orange-50 text-orange-600 border border-orange-200 hover:bg-orange-100 px-5 py-2 rounded-lg font-bold transition">Cooking</button>
          <button class="bg-green-50 text-green-600 border border-green-200 hover:bg-green-100 px-5 py-2 rounded-lg font-bold transition">Serving</button>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
