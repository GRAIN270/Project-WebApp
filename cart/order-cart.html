<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cart</title>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#f5efe6',
                        primaryOrange: '#ff5a1f'
                    }
                }
            }
        }
    </script>
</head>

<body class="min-h-screen bg-cream flex items-center justify-center p-6">
    <div class="card bg-base-100 shadow-xl w-full max-w-lg rounded-3xl">
        <div class="card-body gap-6">
            <h2 class="card-title text-2xl font-bold text-primaryOrange">🛒 Cart</h2>
            <div class="flex flex-col gap-4">

                <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-orange-50 transition cart-item">
                    <div class="w-14 h-14 rounded-xl bg-orange-100 flex items-center justify-center text-xl">🍝</div>
                    <div class="flex-1">
                        <p class="font-semibold">Menu Item A</p>
                        <p class="text-sm text-base-content/60">Delicious pasta</p>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="font-bold text-lg text-primaryOrange price" data-price="19">$19</span>
                        <div class="join">
                            <button class="btn btn-xs join-item btn-error btn-soft"
                                onclick="changeQty(this, -1)">−</button>
                            <span class="btn btn-xs join-item qty no-animation transition-all duration-150">0</span>
                            <button class="btn btn-xs join-item btn-success btn-soft"
                                onclick="changeQty(this, 1)">+</button>
                        </div>
                    </div>
                </div>


                <div class="flex items-center gap-4 p-3 rounded-xl hover:bg-orange-50 transition cart-item">
                    <div class="w-14 h-14 rounded-xl bg-orange-100 flex items-center justify-center text-xl">🍔</div>
                    <div class="flex-1">
                        <p class="font-semibold">Menu Item B</p>
                        <p class="text-sm text-base-content/60">Juicy burger</p>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <span class="font-bold text-lg text-primaryOrange price" data-price="25">$25</span>
                        <div class="join">
                            <button class="btn btn-xs join-item btn-error btn-soft"
                                onclick="changeQty(this, -1)">−</button>
                            <span class="btn btn-xs join-item qty no-animation transition-all duration-150">0</span>
                            <button class="btn btn-xs join-item btn-success btn-soft"
                                onclick="changeQty(this, 1)">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between pt-4 border-t">
                <div>
                    <p class="text-sm text-base-content/60">Total</p>
                    <p class="text-3xl font-bold text-primaryOrange total transition-all">$0</p>
                </div>

                <div class="flex gap-2">
                    <button class="btn btn-ghost">Order</button>
                    <button class="btn bg-primaryOrange text-white border-none hover:opacity-90">Pay</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function changeQty(btn, delta) {
            const item = btn.closest('.cart-item');
            const qtyEl = item.querySelector('.qty');
            let qty = parseInt(qtyEl.textContent);
            qty = Math.max(0, qty + delta);
            qtyEl.textContent = qty;
            qtyEl.classList.add("scale-125");
            setTimeout(() => qtyEl.classList.remove("scale-125"), 150);
            updateTotal();
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.cart-item').forEach(item => {
                const qty = parseInt(item.querySelector('.qty').textContent);
                const price = parseInt(item.querySelector('.price').dataset.price);
                total += qty * price;
            });

            const totalEl = document.querySelector('.total');
            totalEl.classList.add("opacity-50");
            setTimeout(() => {
                totalEl.textContent = `$${total}`;
                totalEl.classList.remove("opacity-50");
            }, 100);
        }
    </script>
</body>

</html>
