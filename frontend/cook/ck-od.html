<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cook Queue</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-base-200 text-base-content">
  <div class="navbar sticky top-0 z-50 bg-[#efe5d7]/95 backdrop-blur border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
    <div class="flex-1">
      <a class="text-2xl font-extrabold text-orange-600">Cook Queue</a>
    </div>
    <div class="flex-none gap-2">
      <a href="/frontend/cook/ck-dsb.html" class="btn btn-sm btn-outline rounded-full">Back</a>
      <button onclick="logoutStaff()" class="btn btn-sm btn-error rounded-full">Logout</button>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 pt-5 pb-2">
    <div class="grid grid-cols-3 gap-4">
      <div class="card bg-base-100 border border-base-300 shadow-sm rounded-3xl">
        <div class="card-body p-5">
          <p class="text-sm text-base-content/60">Pending Orders</p>
          <h2 id="pendingCount" class="text-3xl font-extrabold text-orange-600">0</h2>
        </div>
      </div>
      <div class="card bg-base-100 border border-base-300 shadow-sm rounded-3xl">
        <div class="card-body p-5">
          <p class="text-sm text-base-content/60">Cooking Orders</p>
          <h2 id="cookingCount" class="text-3xl font-extrabold text-orange-600">0</h2>
        </div>
      </div>
      <div class="card bg-base-100 border border-base-300 shadow-sm rounded-3xl">
        <div class="card-body p-5">
          <p class="text-sm text-base-content/60">Ready Orders</p>
          <h2 id="readyCount" class="text-3xl font-extrabold text-orange-600">0</h2>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 py-3 flex gap-2 flex-wrap items-center">
    <button id="filter-all" class="btn btn-sm rounded-full bg-orange-600 text-white border-0" onclick="filterOrders('all')">All</button>
    <button id="filter-PENDING" class="btn btn-sm rounded-full bg-white border border-[#d8ccb9] text-[#3d241a]" onclick="filterOrders('PENDING')">Pending</button>
    <button id="filter-COOKING" class="btn btn-sm rounded-full bg-white border border-[#d8ccb9] text-[#3d241a]" onclick="filterOrders('COOKING')">Cooking</button>
    <button id="filter-READY" class="btn btn-sm rounded-full bg-white border border-[#d8ccb9] text-[#3d241a]" onclick="filterOrders('READY')">Ready</button>
    <button id="filter-HISTORY" class="btn btn-sm rounded-full bg-white border border-[#d8ccb9] text-[#3d241a]" onclick="filterOrders('HISTORY')">History</button>
    <label class="input input-bordered rounded-full flex items-center gap-2 ml-auto w-full lg:w-[340px]">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 opacity-60" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Z" />
      </svg>
      <input id="searchInput" type="text" class="grow" placeholder="Search order / table / menu..." oninput="renderOrders()" />
    </label>
    <button class="btn btn-sm rounded-full btn-outline" onclick="refreshNow()">Refresh Now</button>
    <p id="lastSyncText" class="text-xs text-base-content/60">Last sync: -</p>
  </div>

  <main class="max-w-7xl mx-auto px-4 pb-8">
    <div id="orders" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
    <section id="historyPanel" class="hidden card bg-base-100 border border-base-300 shadow-sm rounded-3xl">
      <div class="card-body p-4">
        <h2 class="font-bold text-lg text-orange-700">Order History</h2>
      </div>
      <div class="overflow-x-auto px-4 pb-4">
        <table class="table table-sm">
          <thead>
            <tr class="text-base-content/50 text-xs uppercase tracking-wide">
              <th>Order</th>
              <th>Table</th>
              <th>Time</th>
              <th>Items</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="historyBody" class="text-sm"></tbody>
        </table>
      </div>
    </section>
    <p id="emptyMsg" class="hidden text-center text-base-content/40 mt-16 text-sm">No queue items found.</p>
  </main>

  <script src="../app.js"></script>
  <script>
    requireStaff("cook");

    let currentFilter = "all";
    let latestOrders = [];

    function waitMinutes(orderTime) {
      const t = new Date(orderTime || '');
      if (Number.isNaN(t.getTime())) return 0;
      const diff = Date.now() - t.getTime();
      return Math.max(0, Math.floor(diff / 60000));
    }

    function isToday(value) {
      const d = new Date(value || '');
      if (Number.isNaN(d.getTime())) return false;
      const n = new Date();
      return d.getFullYear() === n.getFullYear() && d.getMonth() === n.getMonth() && d.getDate() === n.getDate();
    }

    function urgency(waitMins) {
      if (waitMins >= 20) return '<span class="badge badge-sm badge-error">Urgent</span>';
      if (waitMins >= 10) return '<span class="badge badge-sm badge-warning">Soon</span>';
      return '<span class="badge badge-sm badge-ghost">Normal</span>';
    }

    function nextItemStatus(s) {
      if (s === 'PENDING') return 'COOKING';
      if (s === 'COOKING') return 'READY';
      if (s === 'READY') return 'SERVED';
      return 'SERVED';
    }

    function badge(status) {
      const map = {
        PENDING: '<span class="badge badge-sm badge-warning">Pending</span>',
        COOKING: '<span class="badge badge-sm badge-info">Cooking</span>',
        READY: '<span class="badge badge-sm badge-success">Ready</span>',
        SERVED: '<span class="badge badge-sm">Served</span>',
        CANCELLED: '<span class="badge badge-sm badge-error">Cancelled</span>'
      };
      return map[status] || `<span class="badge badge-sm">${status}</span>`;
    }

    function optionText(i) {
      const options = i.selectedOptions || [];
      if (!options.length) return '';
      return `<div class="text-xs opacity-70 mt-1">${options.map(o => `${o.group}: ${o.label}`).join(' | ')}</div>`;
    }

    function filterBySearch(rows) {
      const q = String(document.getElementById('searchInput')?.value || '').trim().toLowerCase();
      if (!q) return rows;
      return rows.filter((o) => {
        const orderNo = String(o?.id || '').toLowerCase();
        const tableNo = String(o?.table_id || '').toLowerCase();
        const itemText = (o?.items || [])
          .map((i) => `${i.name || ''} ${i.note || ''}`)
          .join(' ')
          .toLowerCase();
        return orderNo.includes(q) || tableNo.includes(q) || itemText.includes(q);
      });
    }

    function buildOrderState(order) {
      const items = order.items || [];
      const orderStatus = String(order?.status || '').toUpperCase();
      const hasPending = items.some(i => i.item_status === 'PENDING');
      const hasCooking = items.some(i => i.item_status === 'COOKING');
      const hasReady = items.some(i => i.item_status === 'READY');
      const allServed = items.length > 0 && items.every(i => i.item_status === 'SERVED');
      const isCancelled = orderStatus === 'CANCELLED';
      const isDone = orderStatus === 'DONE' || allServed;
      const isClosed = isCancelled || isDone;
      const canCancel = !isClosed && hasPending && !hasCooking && !hasReady;
      return { hasPending, hasCooking, hasReady, allServed, isCancelled, isDone, isClosed, canCancel };
    }

    async function renderOrders() {
      const container = document.getElementById('orders');
      const historyPanel = document.getElementById('historyPanel');
      const historyBody = document.getElementById('historyBody');
      const emptyMsg = document.getElementById('emptyMsg');

      try {
        const orders = latestOrders.length ? latestOrders : await apiGet('/api/admin/orders');
        const enrichedOrders = (orders || []).map((o) => {
          const state = buildOrderState(o);
          return {
            ...o,
            ...state,
            waitMins: waitMinutes(o.time)
          };
        });
        const todayOrders = enrichedOrders.filter((o) => isToday(o.time));

        document.getElementById('pendingCount').textContent = String(todayOrders.filter(o => o.hasPending && !o.isClosed).length);
        document.getElementById('cookingCount').textContent = String(todayOrders.filter(o => o.hasCooking && !o.isClosed).length);
        document.getElementById('readyCount').textContent = String(todayOrders.filter(o => o.hasReady && !o.isClosed).length);

        let byStatus = [];
        if (currentFilter === 'HISTORY') {
          byStatus = todayOrders.filter(o => o.isClosed);
        } else if (currentFilter === 'all') {
          byStatus = todayOrders.filter(o => !o.isClosed);
        } else if (currentFilter === 'PENDING') {
          byStatus = todayOrders.filter(o => o.hasPending && !o.isClosed);
        } else if (currentFilter === 'COOKING') {
          byStatus = todayOrders.filter(o => o.hasCooking && !o.isClosed);
        } else if (currentFilter === 'READY') {
          byStatus = todayOrders.filter(o => o.hasReady && !o.isClosed);
        }
        const filtered = filterBySearch(byStatus);

        if (currentFilter === 'HISTORY') {
          filtered.sort((a, b) => new Date(b.time) - new Date(a.time));
        } else {
          filtered.sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        const isHistory = currentFilter === 'HISTORY';
        container.classList.toggle('hidden', isHistory);
        historyPanel.classList.toggle('hidden', !isHistory);

        emptyMsg.classList.toggle('hidden', filtered.length > 0);
        emptyMsg.textContent = currentFilter === 'HISTORY'
          ? 'No history orders found.'
          : 'No queue items found.';

        if (isHistory) {
          historyBody.innerHTML = filtered.map((o) => {
            const dt = o.time ? new Date(o.time) : null;
            const timeText = dt && !Number.isNaN(dt.getTime())
              ? dt.toLocaleString([], { hour: '2-digit', minute: '2-digit', day: '2-digit', month: 'short' })
              : '-';
            const itemSummary = (o.items || [])
              .map((i) => `${i.name || '-'} x${i.qty || 1}`)
              .join(', ');
            return `<tr>
              <td>#${o.id || '-'}</td>
              <td>${o.table_id || '-'}</td>
              <td>${timeText}</td>
              <td class="max-w-[420px] truncate" title="${itemSummary}">${itemSummary || '-'}</td>
              <td>${o.isCancelled ? badge('CANCELLED') : badge('SERVED')}</td>
            </tr>`;
          }).join('');
          return;
        }

        container.innerHTML = filtered.map((o) => {
          const canUpdate = currentFilter !== 'HISTORY' && !o.isClosed;
          const dt = o.time ? new Date(o.time) : null;
          const timeText = dt && !Number.isNaN(dt.getTime())
            ? dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            : '-';
          const itemRows = (o.items || []).map((i) => `
            <div class="rounded-lg bg-base-100 border border-base-300 p-2">
              <div class="flex items-center justify-between gap-2">
                <div class="font-medium">${i.name || '-'}</div>
                ${o.isCancelled ? badge('CANCELLED') : badge(i.item_status)}
              </div>
              <div class="text-xs opacity-70">Qty: ${i.qty || 1}</div>
              ${i.note ? `<div class="text-xs opacity-70">Note: ${i.note}</div>` : ''}
              ${optionText(i)}
              <div class="mt-2 flex flex-wrap gap-1 justify-end">
                ${!o.isCancelled && i.item_status === 'PENDING' ? `<button class="btn btn-xs btn-warning text-white" onclick="updateItemStatus(${i.order_item_id}, 'COOKING')">Start Item</button>` : ''}
                ${!o.isCancelled && i.item_status === 'COOKING' ? `<button class="btn btn-xs btn-info text-white" onclick="updateItemStatus(${i.order_item_id}, 'READY')">Ready Item</button>` : ''}
                ${!o.isCancelled && i.item_status === 'READY' ? `<button class="btn btn-xs btn-success text-white" onclick="updateItemStatus(${i.order_item_id}, 'SERVED')">Serve Item</button>` : ''}
              </div>
            </div>
          `).join('');

          const actionButtons = canUpdate ? `
            <div class="mt-3 flex flex-wrap justify-end gap-2">
              ${o.canCancel ? `<button class="btn btn-xs btn-error text-white" onclick="cancelOrder(${o.id})">Cancel Order</button>` : ''}
              ${o.hasPending ? `<button class="btn btn-xs btn-warning text-white" onclick="updateOrderStatus(${o.id}, 'PENDING', 'COOKING')">Start Order</button>` : ''}
              ${o.hasCooking ? `<button class="btn btn-xs btn-info text-white" onclick="updateOrderStatus(${o.id}, 'COOKING', 'READY')">Mark Cooking Ready</button>` : ''}
              ${o.hasReady ? `<button class="btn btn-xs btn-success text-white" onclick="updateOrderStatus(${o.id}, 'READY', 'SERVED')">Serve Order</button>` : ''}
            </div>
          ` : '';

          return `<div class="card bg-base-100 border border-base-300 shadow-sm rounded-3xl"><div class="card-body p-5">
            <div class="flex items-start justify-between gap-2">
              <div>
                <h3 class="font-bold">Order #${o.id || '-'}</h3>
                <p class="text-sm text-base-content/50">Table ${o.table_id || '-'} · ${timeText}</p>
              </div>
              <div class="flex flex-col items-end gap-1">${o.isCancelled ? badge('CANCELLED') : (currentFilter === 'HISTORY' ? badge('SERVED') : urgency(o.waitMins))}</div>
            </div>
            <div class="mt-3 rounded-xl bg-base-200 px-3 py-2">
              <div class="text-xs opacity-70 mb-2">${o.isCancelled ? `Cancelled ${o.waitMins} min ago` : (currentFilter === 'HISTORY' ? `Served ${o.waitMins} min ago` : `Waiting: ${o.waitMins} min`)}</div>
              <div class="space-y-2">${itemRows}</div>
            </div>
            ${actionButtons}
          </div></div>`;
        }).join('');
      } catch (err) {
        container.innerHTML = `<div class="text-red-500">${err.message}</div>`;
      }
    }

    async function refreshNow() {
      try {
        latestOrders = await apiGet('/api/admin/orders');
        const ts = new Date();
        document.getElementById('lastSyncText').textContent = `Last sync: ${ts.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
      } catch (err) {
        console.warn(err.message);
      }
      await renderOrders();
    }

    async function updateOrderStatus(orderId, fromStatus, toStatus) {
      try {
        const order = (latestOrders || []).find((o) => Number(o.id) === Number(orderId));
        if (!order) return;
        const targets = (order.items || []).filter((i) => i.item_status === fromStatus);
        await Promise.all(targets.map((i) => apiSend(`/api/cook/items/${i.order_item_id}`, 'PATCH', { item_status: toStatus })));
        await refreshNow();
      } catch (err) {
        alert(err.message || 'Update failed');
      }
    }

    async function updateItemStatus(orderItemId, toStatus) {
      try {
        await apiSend(`/api/cook/items/${orderItemId}`, 'PATCH', { item_status: toStatus });
        await refreshNow();
      } catch (err) {
        alert(err.message || 'Update failed');
      }
    }

    async function cancelOrder(orderId) {
      const ok = confirm(`Cancel Order #${orderId}?`);
      if (!ok) return;
      try {
        await apiSend(`/api/cook/orders/${orderId}/cancel`, 'PATCH', {});
        await refreshNow();
      } catch (err) {
        alert(err.message || 'Cancel failed');
      }
    }

    function filterOrders(status) {
      currentFilter = status;
      document.querySelectorAll("[id^='filter-']").forEach((b) => {
        b.className = 'btn btn-sm rounded-full bg-white border border-[#d8ccb9] text-[#3d241a]';
      });
      const id = status === 'all' ? 'filter-all' : `filter-${status}`;
      const btn = document.getElementById(id);
      if (btn) btn.className = 'btn btn-sm rounded-full bg-orange-600 text-white border-0';
      renderOrders();
    }

    window.updateOrderStatus = updateOrderStatus;
    window.updateItemStatus = updateItemStatus;
    window.filterOrders = filterOrders;
    window.refreshNow = refreshNow;
    window.cancelOrder = cancelOrder;

    refreshNow();
    setInterval(refreshNow, 6000);
  </script>
</body>
</html>
