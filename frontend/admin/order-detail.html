<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="drawer lg:drawer-open">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col">
      <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
        <div class="flex-none lg:hidden"><label for="admin-drawer" class="btn btn-ghost btn-circle">Menu</label></div>
        <div class="flex-1"><a class="text-2xl font-extrabold text-orange-600">Order Detail</a></div>
        <div class="flex-none"><button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button></div>
      </div>

      <main class="p-4 lg:p-8 space-y-6">
        <div class="flex items-center justify-between flex-wrap gap-4">
          <div>
            <h1 id="od-title" class="text-3xl font-extrabold text-[#3d241a]">Order # -</h1>
            <p id="od-meta" class="text-[#6d2f1d]/70 mt-2">Table - · -</p>
          </div>
          <a href="orders.html" class="btn rounded-full bg-white border border-[#d8ccb9] text-[#6d2f1d] hover:bg-[#f7efe4]">Back to Orders</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <div class="lg:col-span-2 card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
            <div class="card-body">
              <h2 class="card-title">Items</h2>
              <div id="od-items" class="space-y-3"></div>
            </div>
          </div>

          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
            <div class="card-body">
              <h2 class="card-title">Summary</h2>
              <div class="space-y-2 text-sm">
                <p><span class="font-semibold">Order ID:</span> <span id="od-id">-</span></p>
                <p><span class="font-semibold">Table:</span> <span id="od-table">-</span></p>
                <p><span class="font-semibold">Status:</span> <span id="od-status">-</span></p>
                <p><span class="font-semibold">Time:</span> <span id="od-time">-</span></p>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="drawer-side">
      <label for="admin-drawer" class="drawer-overlay"></label>
      <aside class="min-h-full w-72 bg-[#efe5d7] border-r border-[#d8ccb9] p-4">
        <div class="text-2xl font-extrabold text-orange-600 mb-6">Admin Panel</div>
        <div id="admin-sidebar"></div>
      </aside>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    requireStaff("admin");
    setupAdminSidebar();
    document.getElementById("admin-sidebar").innerHTML = adminSidebar("orders.html");

    function getOrderIdFromQuery() {
      const q = new URLSearchParams(window.location.search);
      const raw = q.get("id");
      if (!raw) return null;
      const n = Number(String(raw).replace("ORD-", ""));
      return Number.isFinite(n) ? n : null;
    }

    function renderOrderDetail(order) {
      const title = document.getElementById("od-title");
      const meta = document.getElementById("od-meta");
      const itemsEl = document.getElementById("od-items");
      const oid = document.getElementById("od-id");
      const otable = document.getElementById("od-table");
      const ostatus = document.getElementById("od-status");
      const otime = document.getElementById("od-time");

      if (!order) {
        title.textContent = "Order not found";
        meta.textContent = "Please return to Orders page.";
        itemsEl.innerHTML = '<div class="opacity-60">No data</div>';
        return;
      }

      title.textContent = `${order.id}`;
      meta.textContent = `Table ${order.tableId || "-"} · ${order.status || "-"}`;
      oid.textContent = String(order.id || "-");
      otable.textContent = String(order.tableId || "-");
      ostatus.textContent = String(order.status || "-");
      otime.textContent = order.time ? new Date(order.time).toLocaleString() : "-";

      const rows = (order.items || []).map((x) => `
        <div class="flex justify-between border-b pb-3">
          <span>${itemLabel(x)} x ${x.qty || 1}</span>
          <span>${money(x.totalPrice || 0)}</span>
        </div>
      `).join("");
      itemsEl.innerHTML = rows + `<div class="flex justify-between font-bold text-lg"><span>Total</span><span>${money(order.total || 0)}</span></div>`;
    }

    async function initOrderDetailPage() {
      try {
        await syncAllFromDB();
      } catch (err) {
        console.warn(err.message);
      }
      const id = getOrderIdFromQuery();
      const orders = getOrders() || [];
      const order = orders.find((o) => Number(o.dbId || String(o.id).replace("ORD-", "")) === Number(id));
      renderOrderDetail(order);
    }

    initOrderDetailPage();
  </script>
</body>
</html>
