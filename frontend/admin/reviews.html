<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reviews</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content">
  <div class="drawer lg:drawer-open">
    <input id="admin-drawer" type="checkbox" class="drawer-toggle" />

    <div class="drawer-content flex flex-col">
      <div class="navbar bg-[#efe5d7]/95 border-b border-[#d8ccb9] shadow-sm px-3 lg:px-8">
        <div class="flex-none lg:hidden"><label for="admin-drawer" class="btn btn-ghost btn-circle">Menu</label></div>
        <div class="flex-1"><a class="text-2xl font-extrabold text-orange-600">Reviews</a></div>
        <div class="flex-none"><button onclick="logoutStaff()" class="btn btn-outline btn-error rounded-full">Logout</button></div>
      </div>

      <main class="p-4 lg:p-8 space-y-6">
        <div>
          <h1 class="text-3xl font-extrabold text-[#3d241a]">Customer Reviews</h1>
          <p class="text-[#6d2f1d]/70 mt-2">Review ratings and customer feedback.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]"><div class="card-body"><p class="text-sm text-[#6d2f1d]/60">Average Rating</p><h2 id="avg-rating" class="text-4xl font-extrabold text-orange-600">0.0</h2></div></div>
          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]"><div class="card-body"><p class="text-sm text-[#6d2f1d]/60">Total Reviews</p><h2 id="total-reviews" class="text-4xl font-extrabold text-orange-600">0</h2></div></div>
          <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]"><div class="card-body"><p class="text-sm text-[#6d2f1d]/60">Top Rated Item</p><h2 id="top-rated" class="text-2xl font-extrabold text-orange-600">-</h2></div></div>
        </div>

        <div class="card bg-white border border-[#e6dac8] shadow-md rounded-[1.75rem]">
          <div class="overflow-x-auto">
            <table class="table">
              <thead>
                <tr><th>Order</th><th>Menu</th><th>Rating</th><th>Comment</th></tr>
              </thead>
              <tbody id="reviews-tbody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <div class="drawer-side">
      <label for="admin-drawer" class="drawer-overlay"></label>
      <aside class="min-h-full w-72 bg-[#efe5d7] border-r border-[#d8ccb9] p-4">
        <div class="text-2xl font-extrabold text-orange-600 mb-6">Admin Panel</div>
        <div id="admin-sidebar"></div>
      </aside>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    requireStaff("admin");
    setupAdminSidebar();
    document.getElementById("admin-sidebar").innerHTML = adminSidebar("reviews.html");

    function renderReviews() {
      const reviews = getReviews() || [];
      const tbody = document.getElementById("reviews-tbody");
      const avg = reviews.length ? (reviews.reduce((s, r) => s + Number(r.rating || 0), 0) / reviews.length).toFixed(1) : "0.0";
      document.getElementById("avg-rating").textContent = avg;
      document.getElementById("total-reviews").textContent = String(reviews.length);

      const scoreByMenu = {};
      reviews.forEach((r) => { scoreByMenu[r.menu] = (scoreByMenu[r.menu] || 0) + Number(r.rating || 0); });
      let top = "-";
      let max = -1;
      Object.keys(scoreByMenu).forEach((menu) => {
        if (scoreByMenu[menu] > max) { max = scoreByMenu[menu]; top = menu; }
      });
      document.getElementById("top-rated").textContent = top;

      if (!reviews.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center opacity-50 py-4">No reviews found.</td></tr>';
        return;
      }

      tbody.innerHTML = reviews.map((r) => `
        <tr>
          <td class="font-bold">${r.order || '-'}</td>
          <td>${r.menu}</td>
          <td class="text-orange-500">${starText(Number(r.rating || 0))}</td>
          <td class="italic text-gray-600">"${r.comment || '-'}"</td>
        </tr>
      `).join("");
    }

    async function initReviewsPage() {
      try {
        await syncAllFromDB();
      } catch (err) {
        console.warn(err.message);
      }
      renderReviews();
    }

    initReviewsPage();
    setInterval(initReviewsPage, 10000);
  </script>
</body>
</html>
