<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-screen bg-[#f7f4ee] text-base-content flex items-center justify-center p-4">
  <div class="card w-full max-w-md bg-white border border-[#e6dac8] shadow-xl rounded-[2rem] overflow-hidden">
    <div class="h-24 bg-gradient-to-r from-[#3d241a] via-[#6d2f1d] to-orange-600 relative">
      <div class="absolute inset-0 bg-black/10"></div>
      <div class="absolute bottom-4 left-6 text-white">
        <h2 class="text-2xl font-extrabold">Staff Login</h2>
      </div>
    </div>

    <div class="card-body p-6 md:p-8 space-y-4">
      <div>
        <label class="label">
          <span class="label-text font-semibold text-[#6d2f1d]">Staff ID</span>
        </label>
        <input
          id="staff-id"
          type="text"
          placeholder="cook01 / admin01"
          class="input w-full rounded-2xl bg-white border-[#d8ccb9] focus:outline-none"
        />
      </div>

      <div>
        <label class="label">
          <span class="label-text font-semibold text-[#6d2f1d]">Password</span>
        </label>
        <input
          id="staff-password"
          type="password"
          placeholder="password..."
          class="input w-full rounded-2xl bg-white border-[#d8ccb9] focus:outline-none"
        />
      </div>

      <div class="grid grid-cols-2 gap-3 pt-2">
        <button id="login-btn" class="btn rounded-full bg-orange-600 hover:bg-orange-700 text-white border-0 shadow-md">
          Login
        </button>
        <button id="cancel-btn" class="btn rounded-full btn-outline border-[#c8b39b] text-[#6d2f1d]">
          Cancel
        </button>
      </div>
      <div class="text-center mt-6 text-sm text-[#6d2f1d]/70">
        New Chef? 
      <a href="register.html" class="text-orange-600 font-bold hover:underline">
        Register here to set your password
      </a>
      </div>
    </div>
  </div>

  <script src="../app.js"></script>
  <script>
    async function doLogin() {
      const staffId = document.getElementById("staff-id").value.trim();
      const password = document.getElementById("staff-password").value.trim();
      if (!staffId) return alert("Please enter Staff ID.");
      if (!password) return alert("Please enter password.");

      try {
        const result = await apiSend('/api/auth/staff/login', 'POST', {
          username: staffId,
          password
        });
        localStorage.setItem("staff_session", JSON.stringify(result.session));
        const role = String(result?.session?.role || '').toLowerCase();
        window.location.href = role === 'cook'
          ? '/frontend/cook/ck-dsb.html'
          : '/frontend/admin/dashboard_Admin.html';
      } catch (err) {
        alert(err.message || "Login failed");
      }
    }

    document.getElementById("login-btn").onclick = doLogin;
    document.getElementById("cancel-btn").onclick = () => {
      document.getElementById("staff-id").value = "";
      document.getElementById("staff-password").value = "";
      window.location.href = "customer-login.html";
    };

    document.getElementById("staff-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
